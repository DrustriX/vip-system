<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Central Cafe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOGIN MODAL -->
<div id="loginModal" class="modal">
    <div class="modal-box">
        <h2>🔐 Admin Login</h2>
        <input type="email" id="email" placeholder="อีเมล Admin">
        <input type="password" id="adminPass" placeholder="รหัสผ่าน">
        <button id="loginBtn">เข้าสู่ระบบ</button>
        <button id="closeBtn">ปิด</button>
        <p id="msg"></p>

        <div id="admin-panel" style="display:none;">
            <hr style="margin:15px 0; opacity:0.2;">
            <h3 style="color:#D4AF37;">➕ เพิ่ม VIP ใหม่</h3>
            <input type="text" id="vipName" placeholder="ชื่อผู้เล่น">
            <input type="number" id="vipDays" placeholder="จำนวนวัน">
            <input type="text" id="vipNote" placeholder="หมายเหตุ">
            <button id="addVipBtn">เพิ่ม VIP</button>
            <button id="logoutBtn" style="margin-top:4px;">ออกจากระบบ</button>
        </div>
    </div>
</div>

<!-- ADD DAYS POPUP -->
<div id="addDaysPopup" class="add-days-popup">
    <div class="popup-box">
        <h3>➕ เพิ่มวัน VIP</h3>
        <p id="popup-name" style="color:#aaa;font-size:0.85rem;"></p>
        <input type="number" id="popup-days" placeholder="จำนวนวันที่ต้องการเพิ่ม" min="1">
        <button class="popup-confirm" id="popup-confirm">ยืนยัน</button>
        <button class="popup-cancel" id="popup-cancel">ยกเลิก</button>
    </div>
</div>

<!-- MAIN -->
<div class="container">
    <header>
        <div>
            <h1>CENTRAL CAFE</h1>
            <p class="subtitle">Premium Member System</p>
        </div>
        <button class="admin-btn" id="openModalBtn">Admin Access</button>
    </header>

    <!-- TABS -->
    <div class="tabs">
        <button class="tab active" data-tab="vip">👑 VIP</button>
        <button class="tab" data-tab="history">📋 ประวัติ</button>
    </div>

    <!-- VIP TAB -->
    <div id="tab-vip" class="tab-content">
        <div class="stats">
            <div class="card">
                <h3 id="vip-count">0</h3>
                <p>สมาชิก VIP</p>
            </div>
            <div class="card">
                <h3 id="expired-count">0</h3>
                <p>หมดอายุ</p>
            </div>
            <div class="card">
                <h3 id="history-count">0</h3>
                <p>ประวัติ</p>
            </div>
        </div>
        <div id="vip-list" class="vip-grid"></div>
    </div>

    <!-- HISTORY TAB -->
    <div id="tab-history" class="tab-content hidden">
        <div id="history-list" class="vip-grid"></div>
    </div>
</div>

<script type="module" src="script.js"></script>
</body>
</html>
